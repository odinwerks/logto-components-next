services:
  # ── logto-dash (Next.js dashboard) ──────────────────────────────────────────
  logto-dash:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
      # They are sourced from your .env file when you run `docker compose build`.
      # Set PUBLIC_BASE_URL in .env to your public CF tunnel URL.
      args:
        NEXT_PUBLIC_THEME:              ${THEME}
        NEXT_PUBLIC_LANG_MAIN:          ${LANG_MAIN}
        NEXT_PUBLIC_LANG_AVAILABLE:     ${LANG_AVAILABLE}
        NEXT_PUBLIC_MFA_ISSUER:         ${MFA_ISSUER}
        NEXT_PUBLIC_DEFAULT_THEME_MODE: ${DEFAULT_THEME_MODE}
        NEXT_PUBLIC_USER_SHAPE:         ${USER_SHAPE}
        NEXT_PUBLIC_NAME_TYPE:          ${NAME_TYPE}
        NEXT_PUBLIC_LOAD_TABS:          ${LOAD_TABS}
        NEXT_PUBLIC_DELETE_REDIRECT_DELAY: ${DELETE_REDIRECT_DELAY}
        NEXT_PUBLIC_BACKEND_TYPE:       ${BACKEND_TYPE}
    networks:
      - dash-net
    # Port 2999 is NOT exposed to the host — only cloudflared can reach it
    # via the internal dash-net network. Remove the comment below if you need
    # direct host access for debugging:
    # ports:
    #   - "2999:2999"
    environment:
      - NODE_ENV=production
      # ── Core Logto config ─────────────────────────────────────────────────
      - APP_ID=${APP_ID}
      - APP_SECRET=${APP_SECRET}
      - ENDPOINT=${ENDPOINT}
      - BASE_URL=${PUBLIC_BASE_URL}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - SCOPES=${SCOPES}
      # ── M2M (account deletion, RBAC) ─────────────────────────────────────
      - LOGTO_M2M_APP_ID=${LOGTO_M2M_APP_ID}
      - LOGTO_M2M_APP_SECRET=${LOGTO_M2M_APP_SECRET}
      - LOGTO_INTROSPECTION_URL=${LOGTO_INTROSPECTION_URL}
      - LOGTO_M2M_RESOURCE=${LOGTO_M2M_RESOURCE}
      # ── Backend and phone-country behavior gates ─────────────────────────
      - BACKEND_TYPE=${BACKEND_TYPE}
      - COUNTRY_CODE_ALLOW_LIST=${COUNTRY_CODE_ALLOW_LIST}
      - COUNTRY_CODE_BLOCK_LIST=${COUNTRY_CODE_BLOCK_LIST}
      # ── Avatar storage (S3-compatible / Supabase) ─────────────────────────
      - PFP_BACKEND=${PFP_BACKEND}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # ── Debug (set DEBUG=true to enable verbose server logging) ───────────
      - DEBUG=${DEBUG}
      # ── UI / theme vars (server-side reads bare names via readEnv) ──────────
      - THEME=${THEME}
      - LANG_MAIN=${LANG_MAIN}
      - LANG_AVAILABLE=${LANG_AVAILABLE}
      - MFA_ISSUER=${MFA_ISSUER}
      - DEFAULT_THEME_MODE=${DEFAULT_THEME_MODE}
      - USER_SHAPE=${USER_SHAPE}
      - NAME_TYPE=${NAME_TYPE}
      - LOAD_TABS=${LOAD_TABS}
      - DELETE_REDIRECT_DELAY=${DELETE_REDIRECT_DELAY}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(2999,'localhost').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  # Routes traffic from your public CF tunnel URL to logto-dash:2999 internally.
  # Configure the tunnel routing in the Cloudflare dashboard:
  #   Public hostname → http://logto-dash:2999
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    networks:
      - dash-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      logto-dash:
        condition: service_healthy
    restart: unless-stopped

volumes: {}

networks:
  dash-net:
    driver: bridge
