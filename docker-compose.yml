services:
  # в”Ђв”Ђ logto-dash (Next.js dashboard) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  logto-dash:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
      # They are sourced from your .env file when you run `docker compose build`.
      # Set BASE_URL to your public CF tunnel URL before building.
      args:
        NEXT_PUBLIC_THEME:              ${NEXT_PUBLIC_THEME:-Default}
        NEXT_PUBLIC_LANG_MAIN:          ${NEXT_PUBLIC_LANG_MAIN:-en-US}
        NEXT_PUBLIC_LANG_AVAILABLE:     ${NEXT_PUBLIC_LANG_AVAILABLE:-en-US}
        NEXT_PUBLIC_MFA_ISSUER:         ${NEXT_PUBLIC_MFA_ISSUER:-MyApp}
        NEXT_PUBLIC_DEFAULT_THEME_MODE: ${NEXT_PUBLIC_DEFAULT_THEME_MODE:-dark}
        NEXT_PUBLIC_USER_SHAPE:         ${NEXT_PUBLIC_USER_SHAPE:-circle}
        NEXT_PUBLIC_NAME_TYPE:          ${NEXT_PUBLIC_NAME_TYPE:-given_family}
        NEXT_PUBLIC_LOAD_TABS:          ${NEXT_PUBLIC_LOAD_TABS:-profile,preferences,security,organizations,identities}
    networks:
      - dash-net
    # Port 2999 is NOT exposed to the host вЂ” only cloudflared can reach it
    # via the internal dash-net network. Remove the comment below if you need
    # direct host access for debugging:
    # ports:
    #   - "2999:2999"
    environment:
      - NODE_ENV=production
      # в”Ђв”Ђ Core Logto config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - APP_ID=${APP_ID}
      - APP_SECRET=${APP_SECRET}
      - ENDPOINT=${ENDPOINT}
      - BASE_URL=${BASE_URL}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - SCOPES=${SCOPES}
      # в”Ђв”Ђ M2M (account deletion, RBAC) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - LOGTO_M2M_APP_ID=${LOGTO_M2M_APP_ID:-}
      - LOGTO_M2M_APP_SECRET=${LOGTO_M2M_APP_SECRET:-}
      - LOGTO_M2M_RESOURCE=${LOGTO_M2M_RESOURCE:-}
      - LOGTO_INTROSPECTION_URL=${LOGTO_INTROSPECTION_URL:-}
      # в”Ђв”Ђ Avatar storage (S3-compatible / Supabase) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # в”Ђв”Ђ Debug (set DEBUG=true to enable verbose server logging) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - DEBUG=${DEBUG:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2999/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # в”Ђв”Ђ Cloudflare Tunnel в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Routes traffic from your public CF tunnel URL to logto-dash:2999 internally.
  # Configure the tunnel routing in the Cloudflare dashboard:
  #   Public hostname в†’ http://logto-dash:2999
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    networks:
      - dash-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      logto-dash:
        condition: service_healthy
    restart: unless-stopped

volumes: {}

networks:
  dash-net:
    driver: bridge
