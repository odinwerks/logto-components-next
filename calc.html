
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
   :root{
     --bg:#0e0e10;--surface:#16161a;--surface2:#1e1e24;--surface3:#26262e;
     --border:#2a2a36;--text:#f0f0f5;--muted:#686884;--accent:#4080ff;
     --red:#e05260;--amber:#e8a020;--green:#2dbc7a;
   }
  body{background:var(--bg);font-family:'IBM Plex Sans',sans-serif}
  #cw{display:flex;justify-content:center;padding:1.5rem 0;min-height:200px}
  #calc{background:var(--bg);border:1px solid var(--border);border-radius:4px;width:340px;overflow:hidden}

  #display{padding:10px 18px 10px;background:var(--surface);border-bottom:1px solid var(--border);min-height:100px;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
  #mode-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  #mode-label{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:0.1em;font-family:'IBM Plex Sans',sans-serif;cursor:pointer}
  #inv-label{font-size:11px;color:#444;font-weight:500;letter-spacing:0.08em;transition:color 0.15s;cursor:pointer}
  #inv-label.on{color:var(--amber)}
  #fx-label{position:absolute;bottom:8px;left:18px;font-size:11px;color:#444;font-weight:500;letter-spacing:0.08em;transition:color 0.15s;cursor:pointer}
  #fx-label.on{color:var(--accent)}
  #expr-line{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#606078;min-height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
  #main-line{font-family:'IBM Plex Mono',monospace;font-size:34px;color:var(--text);text-align:right;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400}
  #main-line.sm{font-size:22px}
  #main-line.xs{font-size:16px}

  #buttons{padding:6px;display:flex;flex-direction:column;gap:4px;height:408px}
  #main-buttons{display:flex;flex-direction:column;gap:4px;flex:1;min-height:0}
  .row{display:grid;gap:4px;flex:1;min-height:40px}
  .r5{grid-template-columns:repeat(5,1fr)}
  .r4{grid-template-columns:repeat(4,1fr)}

  .btn{
    font-family:'IBM Plex Sans',sans-serif;font-size:17px;font-weight:500;
    background:var(--surface2);color:var(--text);
    border:1px solid var(--border);border-radius:2px;
    cursor:pointer;
    transition:background 0.07s,transform 0.06s;
    display:flex;align-items:center;justify-content:center;
    user-select:none;-webkit-tap-highlight-color:transparent;
    letter-spacing:0.01em;
  }
  .btn:hover{background:var(--surface3)}
  .btn:active{background:#2e2e38;transform:scale(0.96)}

  .fn{font-size:12.5px;color:var(--text);background:var(--surface)}
  .fn:hover{background:var(--surface2)}
  .eq{background:var(--surface2);color:var(--text);font-size:18px}
  .eq:hover{background:var(--surface3)}
  .eq:active{background:#2e2e38;transform:scale(0.96)}
  .zero{grid-column:span 2}
  
  #fn-drawer{overflow:hidden;max-height:0;opacity:0;transition:max-height 0.25s ease,opacity 0.2s ease;flex-shrink:0}
  #fn-drawer.open{max-height:176px;opacity:1}
  #fn-drawer .row{flex:none;height:40px;min-height:0}
  #fn-drawer .btn{height:40px}
</style>

<div id="cw">
<div id="calc">
  <div id="display">
    <div id="mode-row">
      <div id="mode-label">DEG</div>
      <div id="inv-label">INV</div>
    </div>
    <div id="expr-line"></div>
    <div id="main-line">0</div>
    <div id="fx-label">f(x)</div>
  </div>
  <div id="buttons">

    <div id="fn-drawer">
      <div style="display:flex;flex-direction:column;gap:4px;padding-bottom:4px">
        <div class="row r5">
          <button class="btn fn" data-a="toggleMode">DEG</button>
          <button class="btn fn" data-a="inv">INV</button>
          <button class="btn fn" data-a="fn" data-f="pi">π</button>
          <button class="btn fn" data-a="fn" data-f="e_const">e</button>
          <button class="btn fn" data-a="fn" data-f="abs">|x|</button>
        </div>
        <div class="row r5">
          <button class="btn fn" data-a="fn" data-f="sin">sin</button>
          <button class="btn fn" data-a="fn" data-f="cos">cos</button>
          <button class="btn fn" data-a="fn" data-f="tan">tan</button>
          <button class="btn fn" data-a="fn" data-f="ln">ln</button>
          <button class="btn fn" data-a="fn" data-f="log">log</button>
        </div>
        <div class="row r5">
          <button class="btn fn" data-a="fn" data-f="asin">asin</button>
          <button class="btn fn" data-a="fn" data-f="acos">acos</button>
          <button class="btn fn" data-a="fn" data-f="atan">atan</button>
          <button class="btn fn" data-a="fn" data-f="log2">log₂</button>
          <button class="btn fn" data-a="fn" data-f="sqrt">√x</button>
        </div>
         <div class="row r5">
           <button class="btn fn" data-a="fn" data-f="pow">xʸ</button>
           <button class="btn fn" data-a="fn" data-f="fact">n!</button>
           <button class="btn fn" data-a="fn" data-f="inv_x">1/x</button>
           <button class="btn fn" data-a="fn" data-f="exp10">10ˣ</button>
           <button class="btn fn" data-a="fn" data-f="exp">eˣ</button>
         </div>
      </div>
    </div>

    <div id="main-buttons">
    <div class="row r4">
      <button class="btn" data-a="smartParen">( )</button>
      <button class="btn" data-a="op" data-o="%">%</button>
      <button class="btn" data-a="op" data-o="+">+</button>
      <button class="btn" data-a="op" data-o="-">−</button>
    </div>
    <div class="row r4">
      <button class="btn" data-a="digit" data-d="7">7</button>
      <button class="btn" data-a="digit" data-d="8">8</button>
      <button class="btn" data-a="digit" data-d="9">9</button>
      <button class="btn" data-a="op" data-o="/">÷</button>
    </div>
    <div class="row r4">
      <button class="btn" data-a="digit" data-d="4">4</button>
      <button class="btn" data-a="digit" data-d="5">5</button>
      <button class="btn" data-a="digit" data-d="6">6</button>
      <button class="btn" data-a="op" data-a="op" data-o="*">×</button>
    </div>
    <div class="row r4">
      <button class="btn" data-a="digit" data-d="1">1</button>
      <button class="btn" data-a="digit" data-d="2">2</button>
      <button class="btn" data-a="digit" data-d="3">3</button>
      <button class="btn" id="backspace-btn" data-a="del">⌫</button>
    </div>
    <div class="row r4">
      <button class="btn zero" data-a="digit" data-d="0">0</button>
      <button class="btn" data-a="dot">.</button>
      <button class="btn eq" data-a="equals">=</button>
    </div>
    </div>
  </div>
</div>
</div>

<script>
(function(){
  const S = {
    expr: '',
    curToken: '',
    isRad: false,
    invOn: false,
    justEvaled: false,
    openParens: 0,
    lastWasOp: true,
    lastWasClose: false,
  };

  const exprEl  = document.getElementById('expr-line');
  const mainEl  = document.getElementById('main-line');
  const modeLbl = document.getElementById('mode-label');
  const invLbl  = document.getElementById('inv-label');

  function fmtNum(n){
    if(typeof n!=='number') return String(n);
    if(!isFinite(n)) return isNaN(n)?'Error':n>0?'Infinity':'-Infinity';
    if(n===0) return '0';
    const abs=Math.abs(n);
    if(abs>=1e13||abs<1e-9) return n.toPrecision(9).replace(/\.?0+$/,'');
    return parseFloat(n.toPrecision(12)).toString();
  }

  function getDisplayStr(){
    if(S.curToken!=='') return S.curToken;
    if(S.expr==='') return '0';
    return S.expr;
  }

  function updateDisplay(resultStr){
    const shown = resultStr !== undefined ? resultStr : (S.curToken || (S.justEvaled ? S.expr : S.curToken || '0'));
    mainEl.textContent = shown || '0';
    const l = (shown||'0').length;
    mainEl.className = l>16?'xs':l>11?'sm':'';
    exprEl.textContent = resultStr!==undefined ? S.expr+' =' : buildExprDisplay();
  }

  function buildExprDisplay(){
    return S.expr + (S.curToken ? S.curToken : '');
  }

  function smartParen(){
    flush();
    if(S.openParens > 0 && !S.lastWasOp){
      S.expr += ')';
      S.openParens--;
      S.lastWasOp = false;
      S.lastWasClose = true;
    } else {
      if(!S.lastWasOp && !S.lastWasClose && S.expr!==''){
        S.expr += '*';
      }
      S.expr += '(';
      S.openParens++;
      S.lastWasOp = true;
      S.lastWasClose = false;
    }
    updateDisplay();
  }

  function flush(){
    if(S.curToken==='') return;
    S.expr += S.curToken;
    S.curToken = '';
    S.lastWasOp = false;
    S.lastWasClose = false;
  }

  function evaluate(str){
    str = str.trim();
    if(str==='') return 0;
    const tokens = tokenize(str);
    if(!tokens) return NaN;
    let pos = 0;

    function peek(){ return tokens[pos]; }
    function consume(){ return tokens[pos++]; }

    function parseExpr(){ return parseAddSub(); }

    function parseAddSub(){
      let left = parseMulDiv();
      while(peek()==='+' || peek()==='-'){
        const op = consume();
        const right = parseMulDiv();
        left = op==='+' ? left+right : left-right;
      }
      return left;
    }

    function parseMulDiv(){
      let left = parsePow();
      while(peek()==='*' || peek()==='/' || peek()==='%'){
        const op = consume();
        const right = parsePow();
        if(op==='*') left*=right;
        else if(op==='/') left/=right;
        else left = left - Math.floor(left/right)*right;
      }
      return left;
    }

    function parsePow(){
      let base = parseUnary();
      if(peek()==='^'){
        consume();
        const exp = parsePow();
        return Math.pow(base,exp);
      }
      return base;
    }

    function parseUnary(){
      if(peek()==='-'){consume(); return -parseUnary();}
      if(peek()==='+'){consume(); return parseUnary();}
      return parsePrimary();
    }

    function parsePrimary(){
      const t = peek();
      if(t===undefined) return 0;

      if(typeof t === 'number') { consume(); return t; }

      if(t==='('){
        consume();
        const v = parseExpr();
        if(peek()===')') consume();
        return v;
      }

      if(typeof t==='string' && t.match(/^[a-z_]+$/)){
        consume();
        if(peek()==='('){
          consume();
          const arg = parseExpr();
          if(peek()===')') consume();
          return applyFunc(t, arg);
        }
        return applyFunc(t, 0);
      }

      consume();
      return NaN;
    }

    try{ const r = parseExpr(); return r; }
    catch(e){ return NaN; }
  }

  function tokenize(str){
    const toks = [];
    let i = 0;
    str = str.replace(/\s+/g,'');
    while(i<str.length){
      const c = str[i];
      if((c>='0'&&c<='9')||c==='.'){
        let n='';
        while(i<str.length&&((str[i]>='0'&&str[i]<='9')||str[i]==='.')){n+=str[i++];}
        toks.push(parseFloat(n));
        continue;
      }
      if(c==='-'){
        const last = toks[toks.length-1];
        if(last===undefined||last==='('||['+','-','*','/','%','^'].includes(last)){
          toks.push('-'); i++; continue;
        }
      }
      if('+-*/%^()'.includes(c)){toks.push(c);i++;continue;}
      if(c>='a'&&c<='z'){
        let name='';
        while(i<str.length&&str[i]>='a'&&str[i]<='z'&&str[i]!=='('){name+=str[i++];}
        const last=toks[toks.length-1];
        if(typeof last==='number'||last===')'){toks.push('*');}
        toks.push(name);
        continue;
      }
      i++;
    }
    return toks;
  }

  function applyFunc(name, x){
    const toR = v => S.isRad ? v : v*(Math.PI/180);
    const frR = v => S.isRad ? v : v*(180/Math.PI);
    switch(name){
      case 'sin':  return Math.sin(toR(x));
      case 'cos':  return Math.cos(toR(x));
      case 'tan':  return Math.tan(toR(x));
      case 'asin': return frR(Math.asin(x));
      case 'acos': return frR(Math.acos(x));
      case 'atan': return frR(Math.atan(x));
      case 'ln':   return Math.log(x);
      case 'log':  return Math.log10(x);
      case 'log2': return Math.log2(x);
      case 'sqrt': return Math.sqrt(x);
      case 'fact': {
        let n=Math.round(x); if(n<0||n>170) return NaN;
        let r=1; for(let i=2;i<=n;i++) r*=i; return r;
      }
      case 'abs':  return Math.abs(x);
      case 'inv_x':return 1/x;
      case 'exp10':return Math.pow(10,x);
       case 'exp': return Math.exp(x);
      default: return x;
    }
  }

  function act(a, data){
    if(S.justEvaled && a==='digit'){
      S.expr=''; S.curToken=''; S.openParens=0;
      S.lastWasOp=true; S.lastWasClose=false; S.justEvaled=false;
    }
    if(S.justEvaled && a==='op'){
      flush(); S.justEvaled=false;
    }

     switch(a){
       case 'digit':{
         if(S.curToken==='0'&&data!=='.') S.curToken=data;
         else if(S.curToken.length<16) S.curToken+=data;
         S.lastWasOp=false; S.lastWasClose=false;
         break;
       }
       case 'dot':{
         if(!S.curToken.includes('.')) S.curToken+=(S.curToken?'':'0')+'.';
         break;
       }
       case 'op':{
         flush();
         if(S.lastWasOp && S.expr.length>0){
           const ops='+-*/%';
           const last=S.expr[S.expr.length-1];
           if(ops.includes(last)) S.expr=S.expr.slice(0,-1);
         }
         S.expr+=data; S.lastWasOp=true; S.lastWasClose=false;
         break;
       }
       case 'smartParen': smartParen(); return;
       case 'del':{
         if(S.justEvaled){S.expr='';S.curToken='';S.openParens=0;S.lastWasOp=true;S.justEvaled=false;break;}
         if(S.curToken){
           S.curToken=S.curToken.slice(0,-1);
         } else if(S.expr){
           const last=S.expr[S.expr.length-1];
           if(last==='(') S.openParens--;
           if(last===')') S.openParens++;
           S.expr=S.expr.slice(0,-1);
           const newLast=S.expr[S.expr.length-1];
           S.lastWasOp = !newLast||'+-*/%^('.includes(newLast);
           S.lastWasClose = newLast===')';
         }
         break;
       }
       case 'clear':{
         S.expr='';S.curToken='';S.openParens=0;
         S.lastWasOp=true;S.lastWasClose=false;S.justEvaled=false;
         break;
       }
       case 'equals':{
         flush();
         while(S.openParens>0){S.expr+=')';S.openParens--;}
         if(S.expr===''){updateDisplay();return;}
         const result = evaluate(S.expr);
         const rs = fmtNum(result);
         updateDisplay(rs);
         S.expr = rs;
         S.curToken='';S.openParens=0;S.lastWasOp=false;
         S.lastWasClose=false;S.justEvaled=true;
         return;
       }
        case 'fn':{
          const f=data;
          if(f==='pi'){
            flush();
            if(!S.lastWasOp&&S.expr) S.expr+='*';
            S.expr+='3.14159265358979';
            S.lastWasOp=false;
          } else if(f==='e_const'){
            flush();
            if(!S.lastWasOp&&S.expr) S.expr+='*';
            S.expr+='2.71828182845905';
            S.lastWasOp=false;
          } else if(f==='pow'){
            flush();
            S.expr+='^'; S.lastWasOp=true;
          } else {
            flush();
            if(!S.lastWasOp&&S.expr) S.expr+='*';
            S.expr+=f+'(';
            S.openParens++;
            S.lastWasOp=true;S.lastWasClose=false;
          }
          break;
        }
       case 'inv':{
         S.invOn=!S.invOn;
         invLbl.className=S.invOn?'on':'';
         const swaps={sin:'asin',cos:'acos',tan:'atan',asin:'sin',acos:'cos',atan:'tan'};
         document.querySelectorAll('[data-a="fn"]').forEach(b=>{
           const f=b.dataset.f;
           if(swaps[f]){b.dataset.f=swaps[f];b.textContent=swaps[f];}
         });
         updateDisplay(); return;
       }
       case 'toggleMode':{
         S.isRad=!S.isRad;
         const l=S.isRad?'RAD':'DEG';
         modeLbl.textContent=l;
         document.querySelector('[data-a="toggleMode"]').textContent=l;
         updateDisplay(); return;
       }
     }
     updateDisplay();
  }

  document.getElementById('buttons').addEventListener('click',e=>{
    const b=e.target.closest('.btn');
    if(!b) return;
    const a=b.dataset.a;
    if(!a) return;
    const data=b.dataset.o||b.dataset.d||b.dataset.f||null;
    act(a, data);
  });

  const drawer=document.getElementById('fn-drawer');
  const fxLabel=document.getElementById('fx-label');
  fxLabel.addEventListener('click',()=>{
    const open=drawer.classList.toggle('open');
    fxLabel.classList.toggle('on',open);
  });

  const backspaceBtn = document.getElementById('backspace-btn');
  let longPressTimer = null;
  let isLongPress = false;

  backspaceBtn.addEventListener('mousedown', () => {
    isLongPress = false;
    longPressTimer = setTimeout(() => {
      isLongPress = true;
      backspaceBtn.style.background = '#3a1a1a';
      act('clear');
      mainEl.textContent = '0';
      exprEl.textContent = '';
    }, 500);
  });

  backspaceBtn.addEventListener('mouseup', () => {
    clearTimeout(longPressTimer);
    if (!isLongPress) {
      act('del');
    }
    backspaceBtn.style.background = '';
  });

  backspaceBtn.addEventListener('mouseleave', () => {
    clearTimeout(longPressTimer);
    backspaceBtn.style.background = '';
  });

  backspaceBtn.addEventListener('touchstart', (e) => {
    isLongPress = false;
    longPressTimer = setTimeout(() => {
      isLongPress = true;
      backspaceBtn.style.background = '#3a1a1a';
      act('clear');
      mainEl.textContent = '0';
      exprEl.textContent = '';
    }, 500);
  });

  backspaceBtn.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
    if (!isLongPress) {
      act('del');
    }
    backspaceBtn.style.background = '';
  });

  document.addEventListener('keydown',e=>{
    if(e.key>='0'&&e.key<='9'){act('digit',e.key);return;}
    if(e.key==='.'){act('dot');return;}
    if(e.key==='+'){act('op','+');return;}
    if(e.key==='-'){act('op','-');return;}
    if(e.key==='*'){act('op','*');return;}
    if(e.key==='/'){e.preventDefault();act('op','/');return;}
    if(e.key==='%'){act('op','%');return;}
    if(e.key==='^'){act('fn','pow');return;}
    if(e.key==='Enter'||e.key==='='){act('equals');return;}
    if(e.key==='Backspace'){act('del');return;}
    if(e.key==='Escape'){act('clear');return;}
    if(e.key==='('){flush();document.querySelector('[data-a="smartParen"]').click();return;}
    if(e.key===')'){flush();
      if(S.openParens>0){S.expr+=')';S.openParens--;S.lastWasOp=false;S.lastWasClose=true;updateDisplay();}
      return;}
  });

  updateDisplay();
})();
</script>
