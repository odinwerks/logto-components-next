<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>logto-kit — Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0b0b0d; overflow: hidden; font-family: 'IBM Plex Mono', monospace; }

@keyframes slideIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }
@keyframes riseUp  { from { opacity:0; transform:translateY(7px);  } to { opacity:1; transform:translateY(0); } }
@keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }

#app { display: flex; height: 100vh; overflow: hidden; }

/* ─── Sidebar ──────────────────────────────────────────── */
#sidebar {
  position: relative;
  width: 236px; min-width: 236px;
  height: 100vh;
  background: #0f0f12;
  border-right: 1px solid rgba(255,255,255,0.055);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: slideIn 0.32s cubic-bezier(0.4,0,0.2,1);
}
#particles-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* Brand */
#brand {
  position: relative; z-index: 1;
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 9px;
}
#brand-icon { width: 20px; height: 20px; flex-shrink: 0; color: rgba(255,255,255,0.4); display: flex; align-items: center; }
#brand-name { font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.52); letter-spacing: 0.06em; }
#brand-ver {
  margin-left: auto;
  font-size: 9px; color: rgba(255,255,255,0.18); letter-spacing: 0.08em;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 3px; padding: 2px 5px;
}

/* Nav list */
#nav-list {
  position: relative; z-index: 1;
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 6px 0;
  scrollbar-width: none;
}
#nav-list::-webkit-scrollbar { display: none; }

.nav-group-label {
  font-size: 9px; font-weight: 500;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 12px 18px 5px;
}

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8.5px 18px;
  cursor: pointer; position: relative;
  transition: background 0.12s ease;
  user-select: none;
}
.nav-item:hover { background: rgba(255,255,255,0.022); }
.nav-item.active { background: rgba(255,255,255,0.038); }

.nav-bar {
  position: absolute; left: 0; top: 22%; bottom: 22%;
  width: 2px; border-radius: 0 2px 2px 0;
  background: rgba(255,255,255,0.42);
  opacity: 0; transition: opacity 0.12s ease;
}
.nav-item.active .nav-bar { opacity: 1; }

.nav-icon {
  width: 14px; height: 14px; flex-shrink: 0;
  color: rgba(255,255,255,0.22);
  transition: color 0.12s ease;
  display: flex; align-items: center; justify-content: center;
}
.nav-item:hover .nav-icon { color: rgba(255,255,255,0.44); }
.nav-item.active .nav-icon { color: rgba(255,255,255,0.6); }

.nav-label {
  font-size: 12px; font-weight: 400;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.02em;
  white-space: nowrap;
  transition: color 0.12s ease;
  flex: 1; text-align: left;
}
.nav-label.code { font-size: 11.5px; color: rgba(255,255,255,0.28); }
.nav-item:hover .nav-label { color: rgba(255,255,255,0.58); }
.nav-item:hover .nav-label.code { color: rgba(255,255,255,0.48); }
.nav-item.active .nav-label { color: rgba(255,255,255,0.84); font-weight: 500; }
.nav-item.active .nav-label.code { color: rgba(255,255,255,0.74); }

.nav-type {
  font-size: 9px; font-weight: 400;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.05em;
  flex-shrink: 0;
  transition: color 0.12s ease;
}
.nav-item.active .nav-type { color: rgba(255,255,255,0.28); }

/* Footer: user button slot */
#nav-footer {
  position: relative; z-index: 1;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 14px 18px;
  display: flex; justify-content: center; align-items: center;
}
#user-btn-slot {
  /* ─── Replace this element with your <UserButton /> ─── */
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.28);
  transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
}
#user-btn-slot:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.52);
}

/* ─── Content ──────────────────────────────────────────── */
#content {
  flex: 1; height: 100vh; overflow-y: auto;
  background: #0b0b0d;
}

#topbar {
  height: 46px; min-height: 46px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center;
  padding: 0 40px; gap: 6px;
  position: sticky; top: 0; z-index: 10;
  background: rgba(11,11,13,0.92);
  backdrop-filter: blur(10px);
}
.crumb { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.05em; }
.sep   { font-size: 11px; color: rgba(255,255,255,0.12); }
#crumb-cur { font-size: 11px; color: rgba(255,255,255,0.46); letter-spacing: 0.02em; }
#tb-type {
  margin-left: auto;
  font-size: 9px; color: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 3px; padding: 2px 6px; letter-spacing: 0.07em;
}

#page { padding: 50px 44px 80px; max-width: 800px; }

#pg-title {
  font-family: 'Instrument Serif', serif;
  font-style: italic; font-weight: 400;
  font-size: 38px;
  color: rgba(255,255,255,0.88);
  letter-spacing: -0.01em; line-height: 1.08;
  margin-bottom: 14px;
  animation: riseUp 0.28s ease-out 0.04s both;
}
#pg-desc {
  font-size: 11.5px; line-height: 1.95;
  color: rgba(255,255,255,0.32);
  max-width: 510px;
  animation: riseUp 0.28s ease-out 0.08s both;
}
#pg-rule {
  height: 1px;
  background: rgba(255,255,255,0.055);
  margin: 34px 0 40px;
  animation: riseUp 0.28s ease-out 0.1s both;
}

.sect {
  border: 1px solid rgba(255,255,255,0.058);
  border-radius: 5px; overflow: hidden;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.01);
}
.sect-head {
  padding: 9px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.045);
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.015);
}
.sect-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,0.18); flex-shrink: 0;
}
.sect-label {
  font-size: 9px; font-weight: 600;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.sect-body { padding: 24px 16px; }
.ph {
  border: 1px dashed rgba(255,255,255,0.07);
  border-radius: 4px;
  padding: 16px 20px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.14);
  letter-spacing: 0.03em; line-height: 1.65;
  background: rgba(255,255,255,0.012);
}
.cur { animation: blink 1.1s step-end infinite; color: rgba(255,255,255,0.22); margin-left: 2px; }

#pg-foot {
  margin-top: 8px; font-size: 10px;
  color: rgba(255,255,255,0.13); letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 7px;
  animation: riseUp 0.28s ease-out 0.4s both;
}
#pg-foot::before {
  content: ''; display: block;
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(255,255,255,0.16); flex-shrink: 0;
}
</style>
</head>

    <canvas id="particles-canvas"></canvas>

    <div id="brand">
      <div id="brand-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 3h4v4H3zM9 3h4v4H9zM3 9h4v4H3zM9 9h4v4H9z" stroke="currentColor" stroke-width="1.15" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="nav-group-label">Reference</div>
    </div>

    <div id="nav-footer">
      <!-- ↓ Replace with your <UserButton /> ↓ -->
      <div id="user-btn-slot" title="UserButton — replace with component">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M2.5 13c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

  </div>

  <div id="content">
    <div id="topbar">
      <span class="crumb">logto-kit</span>
      <span class="sep">/</span>

    </div>

<script>
const ITEMS = [
  {
    id: 'user-button', label: 'UserButton', code: false, type: 'component',
    icon: `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M2.5 13c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`,
    desc: 'Standalone avatar component. Renders as UserButton (clickable, opens Dashboard modal) or UserBadge (display only). Priority: prop → context → auto-fetch. Falls back to a user icon after 1.5 s.',
    sections: ['Quick start', 'Props', 'Examples', 'Notes'],
  },
  {
    id: 'dashboard', label: 'Dashboard', code: false, type: 'component',
    icon: `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="5" height="5" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="9" width="5" height="5" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="5" height="5" rx="0.8" stroke="currentColor" stroke-width="1.3"/></svg>`,
    desc: 'Full user management dashboard. Tabs: Profile, Preferences, Security (TOTP, backup codes, WebAuthn), Identities, Organizations, Dev (tokens, cookies, session). Drop it anywhere — wraps itself in required providers.',

  },

    id: 'protected', label: '<Protected />', code: true, type: 'component',
    icon: `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>`,

    desc: 'Dropdown for switching between organisations. Includes "Be yourself (global)" option. Persists to customData.Preferences.asOrg and sessionStorage. Auto-selects when user has a single org.',

const HINTS = {
  'Quick start':              'Import and mount the component...',
  'Props':                    'Full prop table and TypeScript signatures...',
  'Examples':                 'Live code examples and pattern demos...',
  'Notes':                    'Caveats, known issues, migration notes...',
  'Tab configuration':        'LOAD_TABS env var and aliases...',
  'Installation':             'npm install steps and peer dependencies...',
  'Configuration':            'Provider props and environment variables...',
  'Hooks reference':          'useLogto, useThemeMode, useLangMode, useOrgMode...',
  'Adding a theme':           'Create folder → dark.css, light.css, index.ts...',
  'useThemeMode hook':        'theme, themeColors, setTheme, toggleTheme...',
  'CSS variables':            'Full list of CSS custom properties...',
  'Overview':                 'How this system works end-to-end...',
  'Adding a language':        'Create locale file → register → add to LANG_AVAILABLE...',
  'useLangMode hook':         'lang, setLang...',
  'ENV reference':            'LANG_MAIN, LANG_AVAILABLE, THEME, DEFAULT_THEME_MODE...',
  'Endpoint':                 'POST /api/protected — URL, method, auth...',
  'Request schema':           '{ token, id, action, payload? }...',
  'Response + error codes':   '{ ok, data } or { ok, error, message }...',
  'Registering actions':      'ActionRegistry shape in custom-actions/index.ts...',
};

let active = 'dashboard';

function buildNav() {
  const list = document.getElementById('nav-list');
  const grpLabel = list.querySelector('.nav-group-label');
  list.innerHTML = '';
  list.appendChild(grpLabel);

  ITEMS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (item.id === active ? ' active' : '');
    el.innerHTML = `
      <div class="nav-bar"></div>
      <div class="nav-icon">${item.icon}</div>
      <span class="nav-label${item.code ? ' code' : ''}">${item.label}</span>
      <span class="nav-type">${item.type}</span>
    `;
    el.addEventListener('click', () => { active = item.id; buildNav(); renderPage(); });
    list.appendChild(el);
  });
}

function renderPage() {
  const item = ITEMS.find(i => i.id === active);
  if (!item) return;

  document.getElementById('crumb-cur').textContent = item.label;
  document.getElementById('tb-type').textContent = item.type;

  ['pg-title','pg-desc','pg-rule','pg-foot'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none'; el.offsetHeight;
  });
  document.getElementById('pg-title').textContent = item.label;
  document.getElementById('pg-desc').textContent  = item.desc;

  document.getElementById('pg-title').style.animation = 'riseUp 0.28s ease-out 0.04s both';
  document.getElementById('pg-desc').style.animation  = 'riseUp 0.28s ease-out 0.08s both';
  document.getElementById('pg-rule').style.animation  = 'riseUp 0.28s ease-out 0.1s both';
  document.getElementById('pg-foot').style.animation  = 'riseUp 0.28s ease-out 0.4s both';

  const sects = document.getElementById('sects');
  sects.innerHTML = '';
  (item.sections || []).forEach((sec, i) => {
    const hint = HINTS[sec] || `${sec}...`;
    const d = document.createElement('div');
    d.className = 'sect';
    d.style.animation = `riseUp 0.28s ease-out ${0.13 + i * 0.055}s both`;
    d.innerHTML = `
      <div class="sect-head">
        <div class="sect-dot"></div>
        <span class="sect-label">${sec}</span>
      </div>
      <div class="sect-body">
        <div class="ph">${hint}<span class="cur">▌</span></div>
      </div>
    `;
    sects.appendChild(d);
  });
}

// ── Starfall ─────────────────────────────────────────────
class Starfall {
  constructor(canvas) {
    this.c = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.p = []; this.sz = { w:0, h:0 };
    this.t = 0; this.mouse = { x:0, y:0 }; this.raf = null;
    this._r = () => this.setup();
    this._m = e => {
      const cx = window.innerWidth/2, cy = window.innerHeight/2;
      this.mouse.x = (e.clientX-cx)/cx*11;
      this.mouse.y = (e.clientY-cy)/cy*11;
    };
    window.addEventListener('resize', this._r);
    window.addEventListener('mousemove', this._m);
    this.setup(); this.run();
  }

  setup() {
    const p = this.c.parentElement;
    if (!p) return;
    const W = p.offsetWidth, H = p.offsetHeight;
    this.sz = { w:W, h:H };
    this.c.width = W*this.dpr; this.c.height = H*this.dpr;
    this.c.style.width = W+'px'; this.c.style.height = H+'px';
    this.ctx.setTransform(1,0,0,1,0,0);
    this.ctx.scale(this.dpr, this.dpr);
    this.p = [];
    for (let i=0; i<130; i++) this.p.push(this.spawn());
    this.p.sort((a,b) => a.z-b.z);
  }

  spawn() {
    const r = Math.random();
    const z = r<.15?0 : r<.3?.25 : r<.55?.5 : r<.75?.75 : 1;
    const comet = Math.random()<.09;
    if (comet) {
      const ang = Math.PI/3+(Math.random()-.5)*.7;
      const spd = (Math.random()*1.8+2)*(0.4+z*.6);
      return { x:Math.random()*this.sz.w, y:Math.random()*this.sz.h,
        size:(Math.random()*.7+.5)*(1.2+z), alpha:0,
        dx:Math.cos(ang)*spd, dy:Math.sin(ang)*spd,
        comet:true, len:(Math.random()*20+12)*(0.5+z*.5),
        ang, z, ts:.02+Math.random()*.017, tp:0 };
    }
    const d = 0.3+z*.7;
    return { x:Math.random()*this.sz.w, y:Math.random()*this.sz.h,
      size:(Math.random()*1+.3)*d*1.2,
      alpha:(Math.random()*.42+.13)*d*(0.4+z*.6),
      dx:.11*d+(Math.random()-.5)*.04, dy:.08*d+(Math.random()-.5)*.04,
      comet:false, z, d, tp:Math.random()*Math.PI*2, ts:Math.random()*.032+.014 };
  }

  star(p) {
    const tw = Math.sin(this.t*p.ts+p.tp);
    const pulse = Math.pow((tw+1)/2, 2);
    const fa = p.alpha*(0.12+pulse*.88), fs = p.size*(0.65+pulse*.55);
    const bl = Math.abs(p.z-.7)*2;
    if (bl>.3) this.ctx.filter=`blur(${bl}px)`;
    this.ctx.beginPath(); this.ctx.arc(p.x,p.y,fs,0,Math.PI*2);
    this.ctx.fillStyle=`rgba(255,255,255,${fa})`; this.ctx.fill();
    if (pulse>.55 && p.z>.4) {
      const g=this.ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,fs*3);
      g.addColorStop(0,`rgba(255,255,255,${fa*.12})`); g.addColorStop(1,'rgba(255,255,255,0)');
      this.ctx.beginPath(); this.ctx.arc(p.x,p.y,fs*3,0,Math.PI*2);
      this.ctx.fillStyle=g; this.ctx.fill();
    }
    this.ctx.filter='none';
  }

  comet(p) {
    if (p.alpha<=.01) return;
    const bl=Math.abs(p.z-.7)*2;
    if (bl>.3) this.ctx.filter=`blur(${bl}px)`;
    this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    this.ctx.fillStyle=`rgba(255,255,255,${Math.min(p.alpha,.72)})`; this.ctx.fill();
    const ex=p.x-Math.cos(p.ang)*p.len, ey=p.y-Math.sin(p.ang)*p.len;
    const g=this.ctx.createLinearGradient(p.x,p.y,ex,ey);
    g.addColorStop(0,`rgba(255,255,255,${p.alpha*.28})`);
    g.addColorStop(.5,`rgba(255,255,255,${p.alpha*.09})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    this.ctx.strokeStyle=g; this.ctx.lineWidth=p.size*1.5; this.ctx.lineCap='round';
    this.ctx.beginPath(); this.ctx.moveTo(p.x,p.y); this.ctx.lineTo(ex,ey); this.ctx.stroke();
    this.ctx.filter='none';
  }

  run() {
    this.raf=requestAnimationFrame(()=>this.run());
    this.t++;
    this.ctx.clearRect(0,0,this.sz.w,this.sz.h);
    this.p.sort((a,b)=>a.z-b.z);
    const {w:W,h:H}=this.sz;
    this.p.forEach(p=>{
      const ps=(p.z-.5)*2;
      const mx=this.mouse.x*ps*.38, my=this.mouse.y*ps*.38;
      if (p.comet) {
        if (p.alpha<.55) p.alpha+=p.ts;
        p.x+=p.dx; p.y+=p.dy;
        if (p.x>W+50||p.y>H+50||p.x<-50||p.y<-50)
          Object.assign(p,{...this.spawn(),comet:true,alpha:0});
        this.comet({...p,x:p.x+mx,y:p.y+my});
      } else {
        p.x+=p.dx; p.y+=p.dy;
        if (p.y>H+8){p.y=-8;p.x=Math.random()*W;}
        if (p.x>W+8){p.x=-8;p.y=Math.random()*H;}
        else if(p.x<-8){p.x=W+8;p.y=Math.random()*H;}
        this.star({...p,x:p.x+mx,y:p.y+my});
      }
    });
  }
}

buildNav();
renderPage();
new Starfall(document.getElementById('particles-canvas'));
</script>
